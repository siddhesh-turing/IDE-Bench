services:
  client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: custom:latest
    container_name: custom-directory-check-task
    command: ["sh", "-c", "sleep infinity"]
    environment:
      - TASK_ID=${TASK_ID:-directory-check-task}
    volumes:
      - ../../project:/app/project
    working_dir: /app/project
